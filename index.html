<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026Summer-trip</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",sans-serif;background:#f5f4ef;color:#1a1a18;font-size:15px;line-height:1.6}
.wrap{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.subtitle{color:#6b6b64;font-size:14px;margin-bottom:24px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{border:0.5px solid #c8c7be;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;background:#fff;color:#1a1a18;transition:all .15s}
.tab.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.filters{margin-bottom:16px}
.filter-label{font-size:12px;color:#6b6b64;margin-bottom:6px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pill{border:0.5px solid #c8c7be;border-radius:5px;padding:3px 11px;cursor:pointer;font-size:12px;background:#fff;color:#1a1a18;transition:all .15s}
.pill.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.pill.clear{color:#6b6b64}
.count-bar{font-size:13px;color:#6b6b64;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;padding:13px 15px;display:flex;flex-direction:column;gap:8px}
.card.selected{border:1.5px solid #1D9E75}
.card-head{display:flex;justify-content:space-between;align-items:flex-start}
.city-name{font-size:15px;font-weight:500}
.city-en{font-size:12px;color:#6b6b64;margin-left:4px}
.country-zh{font-size:12px;color:#6b6b64}
.country-en{font-size:11px;color:#9b9b91;margin-left:3px}
.badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.pri-select{font-size:11px;padding:2px 6px;border-radius:4px;border:none;cursor:pointer;-webkit-appearance:none;appearance:none;font-family:inherit;outline:none}
.pri-select.pri-A{background:#EAF3DE;color:#3B6D11}
.pri-select.pri-B{background:#FAEEDA;color:#854F0B}
.pri-select.pri-C{background:#F1EFE8;color:#5F5E5A}
.days-ctrl{display:flex;align-items:center;gap:3px}
.days-ctrl button{width:18px;height:18px;border:0.5px solid #c8c7be;border-radius:3px;background:#fff;cursor:pointer;font-size:13px;line-height:1;color:#1a1a18;padding:0;display:flex;align-items:center;justify-content:center}
.days-ctrl button:hover{background:#f5f4ef}
.days-val{font-size:12px;color:#6b6b64;min-width:28px;text-align:center}
.cats{display:flex;flex-wrap:wrap;gap:4px}
.cat-tag{font-size:11px;background:#f5f4ef;color:#6b6b64;padding:1px 7px;border-radius:4px}
.desc{font-size:13px;color:#6b6b64;line-height:1.6}
.spot-preview{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.spot-chip{font-size:12px;background:#f5f4ef;color:#444;padding:2px 8px;border-radius:4px}
.more-btn{font-size:12px;color:#6b6b64;border:none;background:none;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px;white-space:nowrap}
.spot-detail{display:none;flex-direction:column;gap:5px;border-top:0.5px solid rgba(0,0,0,0.08);padding-top:8px;margin-top:2px}
.spot-detail.open{display:flex}
.spot-row{display:flex;gap:8px;align-items:baseline}
.spot-name{font-size:13px;font-weight:500;min-width:100px;flex-shrink:0;color:#1a1a18}
.spot-note{font-size:12px;color:#6b6b64;flex:1;line-height:1.5}
.add-btn{border:0.5px solid #c8c7be;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:13px;background:#fff;color:#1a1a18;transition:all .15s;width:100%;margin-top:2px}
.add-btn:hover{background:#f5f4ef}
.add-btn.added{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:#f5f4ef;border-radius:8px;padding:12px 14px}
.stat-label{font-size:12px;color:#6b6b64}
.stat-val{font-size:22px;font-weight:500;margin-top:3px}
.warn{background:#FAECE7;color:#993C1D;padding:8px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.region-head{font-size:13px;font-weight:500;color:#6b6b64;margin:16px 0 6px}
.plan-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;margin-bottom:6px}
.plan-city{font-weight:500}
.plan-city-en{font-size:12px;color:#9b9b91;margin-left:4px}
.plan-country{font-size:12px;color:#6b6b64;margin-left:4px}
.plan-days{font-size:13px;color:#6b6b64;min-width:34px;text-align:right}
.remove-btn{border:0.5px solid #c8c7be;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:12px;background:#fff;color:#A32D2D}
.actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.action-btn{border:0.5px solid #c8c7be;border-radius:6px;padding:7px 16px;cursor:pointer;font-size:13px;background:#fff;color:#1a1a18}
.action-btn:hover{background:#f5f4ef}
.action-btn.primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.action-btn.export{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
/* 地图 */
#map-wrap{margin-bottom:24px}
#map-wrap .section-label{font-size:12px;color:#6b6b64;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.map-legend{display:flex;gap:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#6b6b64}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-dot.all{background:#c8c7be;border:1.5px solid #888780}
.legend-dot.sel{background:#1D9E75;border:1.5px solid #0F6E56}
#europe-map{height:400px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.12);background:#e8e4d9}
.leaflet-tooltip{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;font-size:12px;padding:3px 8px;border-radius:5px;border:0.5px solid rgba(0,0,0,0.12);box-shadow:none;white-space:nowrap}
/* 添加游玩地 modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:640px;padding:24px;position:relative}
.modal-title{font-size:16px;font-weight:500;margin-bottom:20px}
.modal-close{position:absolute;top:16px;right:16px;border:none;background:none;cursor:pointer;font-size:20px;color:#6b6b64;line-height:1}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-grid.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:#6b6b64}
.form-group input,.form-group select,.form-group textarea{border:0.5px solid #c8c7be;border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;color:#1a1a18;background:#fff;outline:none;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#888780}
.form-group textarea{resize:vertical;min-height:64px}
.form-section{font-size:12px;font-weight:500;color:#6b6b64;margin:16px 0 8px;padding-bottom:4px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.cat-checks{display:flex;flex-wrap:wrap;gap:6px}
.cat-check{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer}
.cat-check input{width:13px;height:13px;cursor:pointer}
/* 景点列表动态行 */
.spot-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.spot-input-row{display:flex;gap:6px;align-items:center}
.spot-input-row input{flex:1;border:0.5px solid #c8c7be;border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit}
.spot-input-row input.spot-note-in{flex:2}
.spot-input-row .rm-btn{border:0.5px solid #c8c7be;border-radius:5px;background:#fff;cursor:pointer;font-size:13px;color:#A32D2D;padding:3px 8px;flex-shrink:0}
.add-spot-btn{border:0.5px solid #c8c7be;border-radius:6px;padding:4px 12px;font-size:12px;background:#fff;cursor:pointer;color:#6b6b64}
.add-spot-btn:hover{background:#f5f4ef}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:0.5px solid rgba(0,0,0,0.08)}
.modal-footer button{border:0.5px solid #c8c7be;border-radius:6px;padding:7px 18px;cursor:pointer;font-size:13px}
.modal-footer .submit{background:#1a1a18;color:#fff;border-color:#1a1a18}
.form-hint{font-size:11px;color:#9b9b91;margin-top:2px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
.empty{color:#6b6b64;font-size:14px;padding:20px 0}
.note{font-size:12px;color:#6b6b64;background:#f5f4ef;border-radius:6px;padding:8px 12px;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <h1>2026Summer-trip</h1>
  <p class="subtitle">浏览景点 → 加入行程 → 规划路线</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')">景点浏览</button>
    <button class="tab" id="tab-plan" onclick="switchTab('plan')">我的行程</button>
  </div>

  <!-- 浏览页 -->
  <div id="pane-browse">
    <div class="filters">
      <div class="filter-label">按地区</div>
      <div class="pills" id="region-pills"></div>
      <div class="filter-label">按国家</div>
      <div class="pills" id="country-pills"></div>
      <div class="filter-label">按类型（可多选）</div>
      <div class="pills" id="cat-pills"></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="count-bar" id="count-bar" style="margin-bottom:0"></div>
      <button class="action-btn" onclick="openModal()" style="font-size:12px;padding:5px 12px">＋ 添加游玩地</button>
    </div>
    <div class="grid" id="cards"></div>
  </div>

  <!-- 行程页 -->
  <div id="pane-plan" style="display:none">
    <div class="note">选好景点后，点击「复制分享链接」发给同行的人。调整完天数和优先级后，点「导出 data.js」下载并上传至 GitHub 即可永久保存。</div>
    <div class="actions">
      <button class="action-btn primary" onclick="copyLink()">🔗 复制分享链接</button>
      <button class="action-btn" onclick="copyText()">📋 复制行程文字</button>
      <button class="action-btn export" onclick="exportDataJS()">⬇ 导出 data.js</button>
      <button class="action-btn" onclick="clearAll()">× 清空行程</button>
    </div>
    <div class="stats" id="stats"></div>
    <div id="warn-over" class="warn" style="display:none"></div>
    <div id="map-wrap">
      <div class="section-label">
        地图总览
        <div class="map-legend">
          <div class="legend-item"><div class="legend-dot all"></div>所有候选城市</div>
          <div class="legend-item"><div class="legend-dot sel"></div>已加入行程</div>
        </div>
      </div>
      <div id="europe-map"></div>
    </div>
    <div id="plan-list"></div>
    <div id="plan-empty" class="empty" style="display:none">还没有加入任何景点。切换到「景点浏览」，点击「加入行程」开始规划。</div>
  </div>
</div>

<!-- 添加游玩地 Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">添加游玩地</div>

    <div class="form-section">基本信息</div>
    <div class="form-grid">
      <div class="form-group"><label>城市名（中文）*</label><input id="f-city" placeholder="例：科托尔"></div>
      <div class="form-group"><label>城市名（英文）*</label><input id="f-cityEn" placeholder="例：Kotor"></div>
      <div class="form-group"><label>国家（中文）*</label><input id="f-country" placeholder="例：黑山"></div>
      <div class="form-group"><label>国家（英文）*</label><input id="f-countryEn" placeholder="例：Montenegro"></div>
      <div class="form-group">
        <label>所属地区 *</label>
        <select id="f-region">
          <option value="">请选择</option>
          <option>英国</option><option>伊比利亚</option><option>西欧</option>
          <option>意大利</option><option>中欧</option><option>南欧</option>
        </select>
      </div>
      <div class="form-group">
        <label>优先级</label>
        <select id="f-pri">
          <option value="A">必去</option>
          <option value="B" selected>推荐</option>
          <option value="C">备选</option>
        </select>
      </div>
      <div class="form-group">
        <label>默认游览天数</label>
        <input id="f-days" type="number" min="1" value="2">
      </div>
    </div>

    <div class="form-section">地理坐标</div>
    <div class="form-grid">
      <div class="form-group">
        <label>纬度 *</label>
        <input id="f-lat" placeholder="例：42.42">
        <div class="form-hint">可在 Google Maps 右键点击地图获取坐标</div>
      </div>
      <div class="form-group">
        <label>经度 *</label>
        <input id="f-lng" placeholder="例：18.77">
      </div>
    </div>

    <div class="form-section">类型标签</div>
    <div class="cat-checks" id="f-cats">
      <!-- 由 JS 生成 -->
    </div>

    <div class="form-section">特色描述</div>
    <div class="form-grid full">
      <div class="form-group">
        <textarea id="f-unique" placeholder="用一两句话描述这个地方的独特之处，会显示在卡片正文中"></textarea>
      </div>
    </div>

    <div class="form-section">景点预览（最多3个，显示在卡片上）</div>
    <div class="spot-rows" id="f-preview-rows">
      <div class="spot-input-row"><input placeholder="🏰 城堡名称（可加 emoji）"></div>
      <div class="spot-input-row"><input placeholder="🌊 景点二"></div>
      <div class="spot-input-row"><input placeholder="🌿 景点三"></div>
    </div>

    <div class="form-section">景点详情（展开后显示，可按 ＋ 增加）</div>
    <div class="spot-rows" id="f-detail-rows"></div>
    <button class="add-spot-btn" onclick="addDetailRow()">＋ 添加景点</button>

    <div class="modal-footer">
      <button onclick="closeModal()">取消</button>
      <button class="submit" onclick="submitNewDestination()">添加到列表</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="data.js"></script>
<script>
const REGIONS = ["全部","英国","伊比利亚","西欧","意大利","中欧","南欧"];
const CATS = ["艺术","历史","自然","建筑","文化","海岸","音乐","美食","乡村","温泉","宗教"];
const PRI_LABEL = {A:"必去", B:"推荐", C:"备选"};
const REGION_ORDER = ["英国","伊比利亚","西欧","意大利","中欧","南欧"];

let selRegion="全部", selCountry="全部", selCats=[], currentTab="browse";
let selected = new Set();
let priOverrides = new Map();
let daysOverrides = new Map();

function getCountries() {
  return [...new Map(DATA.map(d=>[d.country,{zh:d.country,en:d.countryEn}])).values()];
}

// ── 地图 ──────────────────────────────────────────────
let mapInstance=null, leafletMarkers={};
const STYLE_DEFAULT  = {radius:6, fillColor:"#c8c7be", color:"#888780", weight:1.5, fillOpacity:0.85};
const STYLE_SELECTED = {radius:9, fillColor:"#1D9E75", color:"#0F6E56", weight:2,   fillOpacity:0.95};

function initMap() {
  if (mapInstance) { mapInstance.invalidateSize(); syncAllMarkers(); return; }
  mapInstance = L.map('europe-map',{center:[48,12],zoom:4});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:12
  }).addTo(mapInstance);
  DATA.forEach(addMarker);
}

function addMarker(d) {
  if (!d.coords) return;
  const isSel = selected.has(d.id);
  const m = L.circleMarker(d.coords, isSel ? STYLE_SELECTED : STYLE_DEFAULT)
    .addTo(mapInstance)
    .bindTooltip(`<b>${d.city}</b> ${d.cityEn}`,{direction:'top',offset:[0,-4]});
  if (isSel) m.bringToFront();
  leafletMarkers[d.id] = m;
}

function updateMarker(id) {
  const m = leafletMarkers[id]; if (!m) return;
  const isSel = selected.has(id);
  m.setStyle(isSel ? STYLE_SELECTED : STYLE_DEFAULT);
  isSel ? m.bringToFront() : m.bringToBack();
}

function syncAllMarkers() { Object.keys(leafletMarkers).forEach(id=>updateMarker(+id)); }

// ── URL hash ───────────────────────────────────────────
function updateHash() {
  const s=[...selected].join(',');
  const p=[...priOverrides.entries()].map(([id,v])=>id+'-'+v).join(',');
  const d=[...daysOverrides.entries()].map(([id,v])=>id+'-'+v).join(',');
  let h=s?'s='+s:'';
  if(p) h+=(h?'&':'')+'p='+p;
  if(d) h+=(h?'&':'')+'d='+d;
  history.replaceState(null,'',h?'#'+h:location.pathname);
}

function loadFromHash() {
  try {
    const h=location.hash.replace('#',''); if(!h) return;
    const q=new URLSearchParams(h);
    (q.get('s')||'').split(',').filter(Boolean).forEach(i=>selected.add(+i));
    (q.get('p')||'').split(',').filter(Boolean).forEach(seg=>{ const [id,v]=seg.split('-'); priOverrides.set(+id,v); });
    (q.get('d')||'').split(',').filter(Boolean).forEach(seg=>{ const [id,v]=seg.split('-'); daysOverrides.set(+id,+v); });
  } catch(e){}
}

// ── 有效值 ────────────────────────────────────────────
function getPri(d)  { return priOverrides.has(d.id)  ? priOverrides.get(d.id)  : d.pri; }
function getDays(d) { return daysOverrides.has(d.id) ? daysOverrides.get(d.id) : d.days; }

// ── 交互 ──────────────────────────────────────────────
function setPri(id,sel) {
  priOverrides.set(id,sel.value); sel.className='pri-select pri-'+sel.value;
  updateHash(); updatePlanTab(); if(currentTab==='plan') renderPlan();
}
function adjDays(id,delta) {
  const d=DATA.find(x=>x.id===id), next=Math.max(1,getDays(d)+delta);
  daysOverrides.set(id,next);
  const el=document.getElementById('days-'+id); if(el) el.textContent=next+'天';
  updateHash(); updatePlanTab(); if(currentTab==='plan') renderPlan();
}

function switchTab(t) {
  currentTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='browse')||(i===1&&t==='plan')));
  document.getElementById('pane-browse').style.display=t==='browse'?'':'none';
  document.getElementById('pane-plan').style.display=t==='plan'?'':'none';
  if(t==='plan') { renderPlan(); setTimeout(()=>{ initMap(); syncAllMarkers(); },80); }
}

// ── 筛选 pills ────────────────────────────────────────
function renderRegionPills() {
  document.getElementById('region-pills').innerHTML=REGIONS.map(r=>
    `<button class="pill${r===selRegion?' active':''}" onclick="setRegion('${r}')">${r}</button>`).join('');
}
function renderCountryPills() {
  document.getElementById('country-pills').innerHTML=
    `<button class="pill${'全部'===selCountry?' active':''}" onclick="setCountry('全部')">全部</button>`+
    getCountries().map(c=>`<button class="pill${c.zh===selCountry?' active':''}" onclick="setCountry('${c.zh}')">${c.zh} ${c.en}</button>`).join('');
}
function renderCatPills() {
  document.getElementById('cat-pills').innerHTML=CATS.map(c=>
    `<button class="pill${selCats.includes(c)?' active':''}" onclick="toggleCat('${c}')">${c}</button>`
  ).join('')+(selCats.length?`<button class="pill clear" onclick="clearCats()">× 清除</button>`:'');
}
function setRegion(r)  { selRegion=r; if(r!=='全部') selCountry='全部'; renderRegionPills(); renderCountryPills(); renderCards(); }
function setCountry(c) { selCountry=c; if(c!=='全部') selRegion='全部'; renderRegionPills(); renderCountryPills(); renderCards(); }
function toggleCat(c)  { selCats=selCats.includes(c)?selCats.filter(x=>x!==c):[...selCats,c]; renderCatPills(); renderCards(); }
function clearCats()   { selCats=[]; renderCatPills(); renderCards(); }

function getFiltered() {
  return DATA.filter(d=>{
    if(selRegion!=='全部'&&d.region!==selRegion) return false;
    if(selCountry!=='全部'&&d.country!==selCountry) return false;
    if(selCats.length&&!selCats.some(c=>d.cats.includes(c))) return false;
    return true;
  });
}

// ── 卡片渲染 ──────────────────────────────────────────
function cardHTML(d) {
  const isSel=selected.has(d.id), pri=getPri(d), days=getDays(d);
  const priSel=`<select class="pri-select pri-${pri}" onchange="setPri(${d.id},this)">
    <option value="A"${pri==='A'?' selected':''}>必去</option>
    <option value="B"${pri==='B'?' selected':''}>推荐</option>
    <option value="C"${pri==='C'?' selected':''}>备选</option>
  </select>`;
  const daysCtrl=`<div class="days-ctrl">
    <button onclick="adjDays(${d.id},-1)">−</button>
    <span class="days-val" id="days-${d.id}">${days}天</span>
    <button onclick="adjDays(${d.id},1)">+</button>
  </div>`;
  const chips=(d.spotsPreview||[]).map(s=>`<span class="spot-chip">${s}</span>`).join('');
  const rows=(d.spotsDetail||[]).map(s=>`<div class="spot-row"><span class="spot-name">${s.name}</span><span class="spot-note">${s.note}</span></div>`).join('');
  return `<div class="card${isSel?' selected':''}" id="card-${d.id}">
    <div class="card-head">
      <div>
        <span class="city-name">${d.city}</span><span class="city-en">${d.cityEn}</span><br>
        <span class="country-zh">${d.country}</span><span class="country-en">${d.countryEn}</span>
      </div>
      <div class="badges">${priSel}${daysCtrl}</div>
    </div>
    <div class="cats">${d.cats.map(c=>`<span class="cat-tag">${c}</span>`).join('')}</div>
    <p class="desc">${d.unique}</p>
    <div class="spot-preview">
      ${chips}
      ${rows?`<button class="more-btn" onclick="toggleDetail(${d.id},this)">+ 景点详情</button>`:''}
    </div>
    <div class="spot-detail" id="detail-${d.id}">${rows}</div>
    <button class="add-btn${isSel?' added':''}" onclick="toggle(${d.id})">${isSel?'✓ 已加入行程':'+ 加入行程'}</button>
  </div>`;
}

function renderCards() {
  const items=getFiltered();
  document.getElementById('count-bar').textContent=`共 ${items.length} 处景点`;
  document.getElementById('cards').innerHTML=items.map(cardHTML).join('');
  updatePlanTab();
}

function toggleDetail(id,btn) {
  const el=document.getElementById('detail-'+id), open=el.classList.toggle('open');
  btn.textContent=open?'- 收起':'+ 景点详情';
}

function updatePlanTab() {
  const days=[...selected].reduce((s,id)=>{ const d=DATA.find(x=>x.id===id); return d?s+getDays(d):s; },0);
  document.getElementById('tab-plan').textContent=`我的行程（${selected.size}处 · 约${days}天）`;
}

function toggle(id) {
  selected.has(id)?selected.delete(id):selected.add(id);
  updateHash();
  const card=document.getElementById('card-'+id);
  if(card){
    card.classList.toggle('selected',selected.has(id));
    const btn=card.querySelector('.add-btn');
    btn.className='add-btn'+(selected.has(id)?' added':'');
    btn.textContent=selected.has(id)?'✓ 已加入行程':'+ 加入行程';
  }
  updateMarker(id); updatePlanTab();
  if(currentTab==='plan') renderPlan();
}

function clearAll() {
  if(confirm('确认清空所有已选景点及自定义设置？')){
    selected.clear(); priOverrides.clear(); daysOverrides.clear();
    updateHash(); renderCards(); renderPlan(); syncAllMarkers();
  }
}

// ── 行程页 ────────────────────────────────────────────
function renderPlan() {
  const items=DATA.filter(d=>selected.has(d.id));
  const totalDays=items.reduce((s,d)=>s+getDays(d),0);
  document.getElementById('stats').innerHTML=[
    ["景点数量",items.length+" 处"],["合计天数","约 "+totalDays+" 天"],["剩余天数","约 "+Math.max(0,30-totalDays)+" 天"]
  ].map(([l,v])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-val">${v}</div></div>`).join('');
  const warn=document.getElementById('warn-over');
  if(totalDays>30){ warn.style.display=''; warn.textContent=`⚠ 当前选择合计 ${totalDays} 天，超出1个月预算，建议精简行程。`; }
  else warn.style.display='none';
  const empty=document.getElementById('plan-empty'), list=document.getElementById('plan-list');
  if(!items.length){ empty.style.display=''; list.innerHTML=''; return; }
  empty.style.display='none';
  let html='';
  REGION_ORDER.forEach(r=>{
    const ri=items.filter(d=>d.region===r); if(!ri.length) return;
    html+=`<div class="region-head">${r}</div>`;
    ri.forEach(d=>{
      const pri=getPri(d), days=getDays(d);
      html+=`<div class="plan-row">
        <div style="flex:1"><span class="plan-city">${d.city}</span><span class="plan-city-en">${d.cityEn}</span><span class="plan-country">${d.country} ${d.countryEn}</span></div>
        <span class="pri-select pri-${pri}" style="font-size:11px;padding:2px 7px;border-radius:4px;display:inline-block">${PRI_LABEL[pri]}</span>
        <span class="plan-days">${days}天</span>
        <button class="remove-btn" onclick="toggle(${d.id})">移除</button>
      </div>`;
    });
  });
  list.innerHTML=html;
}

// ── 添加游玩地 Modal ──────────────────────────────────
function openModal() {
  // 生成类型复选框
  document.getElementById('f-cats').innerHTML = CATS.map(c=>
    `<label class="cat-check"><input type="checkbox" value="${c}"> ${c}</label>`
  ).join('');
  // 清空详情行
  document.getElementById('f-detail-rows').innerHTML='';
  addDetailRow(); // 默认一行
  // 清空其他字段
  ['f-city','f-cityEn','f-country','f-countryEn','f-lat','f-lng','f-unique'].forEach(id=>{ document.getElementById(id).value=''; });
  document.getElementById('f-region').value='';
  document.getElementById('f-pri').value='B';
  document.getElementById('f-days').value='2';
  document.querySelectorAll('#f-preview-rows input').forEach(el=>el.value='');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function handleOverlayClick(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function addDetailRow() {
  const row=document.createElement('div');
  row.className='spot-input-row';
  row.innerHTML=`<input class="spot-name-in" placeholder="景点名称"><input class="spot-note-in" placeholder="一句话介绍"><button class="rm-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('f-detail-rows').appendChild(row);
}

function submitNewDestination() {
  const city=document.getElementById('f-city').value.trim();
  const cityEn=document.getElementById('f-cityEn').value.trim();
  const country=document.getElementById('f-country').value.trim();
  const countryEn=document.getElementById('f-countryEn').value.trim();
  const region=document.getElementById('f-region').value;
  const lat=parseFloat(document.getElementById('f-lat').value);
  const lng=parseFloat(document.getElementById('f-lng').value);

  if(!city||!cityEn||!country||!countryEn||!region) { alert('请填写城市名、国家名和地区'); return; }
  if(isNaN(lat)||isNaN(lng)) { alert('请填写有效的经纬度'); return; }

  const cats=[...document.querySelectorAll('#f-cats input:checked')].map(el=>el.value);
  const days=Math.max(1,parseInt(document.getElementById('f-days').value)||2);
  const pri=document.getElementById('f-pri').value;
  const unique=document.getElementById('f-unique').value.trim();

  const spotsPreview=[...document.querySelectorAll('#f-preview-rows input')]
    .map(el=>el.value.trim()).filter(Boolean).slice(0,3);

  const spotsDetail=[...document.querySelectorAll('#f-detail-rows .spot-input-row')].map(row=>{
    const name=row.querySelector('.spot-name-in').value.trim();
    const note=row.querySelector('.spot-note-in').value.trim();
    return name ? {name, note} : null;
  }).filter(Boolean);

  const newId = Math.max(...DATA.map(d=>d.id)) + 1;
  const newEntry = {id:newId, city, cityEn, country, countryEn, region, days, cats, pri,
    coords:[lat,lng], unique, spotsPreview, spotsDetail};

  DATA.push(newEntry);

  // 如果地图已初始化，立刻加入标记
  if(mapInstance) addMarker(newEntry);

  // 重新渲染国家筛选（新国家可能出现）和卡片
  renderCountryPills();
  renderCards();
  closeModal();
  toast(`「${city}」已添加！记得导出 data.js 保存到 GitHub。`);
}

// ── 导出 data.js ──────────────────────────────────────
function exportDataJS() {
  // 将所有 overrides 烘焙进默认值后生成文件
  const q = s => JSON.stringify(s);
  let js = `// 2026Summer-trip 城市数据\n`;
  js += `// 新增城市：在数组末尾添加新对象，id 递增即可\n`;
  js += `// coords: [纬度, 经度] — 用于地图标注\n\n`;
  js += `const DATA = [\n`;

  // 按 region 分组输出，保留注释
  const regionOrder = ["英国","伊比利亚","西欧","意大利","中欧","南欧"];
  const regionLabel = {"英国":"英国","伊比利亚":"伊比利亚","西欧":"西欧","意大利":"意大利","中欧":"中欧","南欧":"南欧"};
  // 未知地区归入末尾
  const grouped = {};
  DATA.forEach(d => { (grouped[d.region]||(grouped[d.region]=[])).push(d); });
  const orderedRegions = [...regionOrder.filter(r=>grouped[r]), ...Object.keys(grouped).filter(r=>!regionOrder.includes(r))];

  orderedRegions.forEach(r => {
    js += `\n  // ── ${regionLabel[r]||r} ${'─'.repeat(Math.max(0,44-(regionLabel[r]||r).length))}─\n`;
    grouped[r].forEach(d => {
      const pri  = priOverrides.has(d.id)  ? priOverrides.get(d.id)  : d.pri;
      const days = daysOverrides.has(d.id) ? daysOverrides.get(d.id) : d.days;
      js += `  {\n`;
      js += `    id:${d.id}, city:${q(d.city)}, cityEn:${q(d.cityEn)},\n`;
      js += `    country:${q(d.country)}, countryEn:${q(d.countryEn)}, region:${q(d.region)},\n`;
      js += `    days:${days}, cats:${q(d.cats)}, pri:${q(pri)},\n`;
      js += `    coords:[${d.coords[0]},${d.coords[1]}],\n`;
      js += `    unique:${q(d.unique)},\n`;
      js += `    spotsPreview:${q(d.spotsPreview)},\n`;
      js += `    spotsDetail:[\n`;
      (d.spotsDetail||[]).forEach(s => { js += `      {name:${q(s.name)}, note:${q(s.note)}},\n`; });
      js += `    ]\n  },\n`;
    });
  });

  js += `];\n`;

  const blob = new Blob([js],{type:'text/javascript'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='data.js'; a.click();
  URL.revokeObjectURL(url);
  toast('data.js 已下载，上传到 GitHub 即可保存更改。');
}

// ── 分享 ──────────────────────────────────────────────
function copyLink() {
  navigator.clipboard.writeText(location.href)
    .then(()=>toast('链接已复制，发给同行的人吧！'))
    .catch(()=>prompt('复制以下链接：',location.href));
}
function copyText() {
  const items=DATA.filter(d=>selected.has(d.id));
  if(!items.length){ toast('还没有选择任何景点'); return; }
  const totalDays=items.reduce((s,d)=>s+getDays(d),0);
  let text=`🗺 2026Summer-trip（约${totalDays}天）\n\n`;
  REGION_ORDER.forEach(r=>{
    const ri=items.filter(d=>d.region===r); if(!ri.length) return;
    text+=`【${r}】\n`;
    ri.forEach(d=>text+=`  · ${d.city} (${d.cityEn})，${d.country}，${getDays(d)}天 — ${PRI_LABEL[getPri(d)]}\n`);
    text+='\n';
  });
  text+=`分享链接：${location.href}`;
  navigator.clipboard.writeText(text).then(()=>toast('行程文字已复制！')).catch(()=>prompt('复制：',text));
}
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ── 初始化 ────────────────────────────────────────────
loadFromHash();
renderRegionPills();
renderCountryPills();
renderCatPills();
renderCards();
</script>
